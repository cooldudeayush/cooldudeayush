name: Generate Snake Animation

# Regenerates the contribution-snake SVG every 12h, on manual run, and on push.
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs (cosmic palette)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=7C9CFF&color_dots=080A1C,2b3563,4a5aa8,7C9CFF,FFD9A8
            dist/github-snake.svg?palette=github-light&color_snake=7C9CFF&color_dots=ebedf0,9ab0ff,7C9CFF,3b5bdb,1b245c

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
