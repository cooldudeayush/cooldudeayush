name: Generate Snake Animation

# Regenerates the contribution-snake SVG every 12h, on manual run, and on push.
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs (classic GitHub green + purple snake)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=A78BFA&color_dots=161b22,0e4429,006d32,26a641,39d353
            dist/github-snake.svg?palette=github-light&color_snake=8B5CF6&color_dots=ebedf0,9be9a8,40c463,30a14e,216e39

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
